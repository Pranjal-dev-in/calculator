<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="displayBox">
            <input type="text" readonly id="display">
        </div>
        <div class="allBtns">
            <button class="btn" id="cross" onclick="deleteElement()"><i class="fa-solid fa-delete-left"></i></button>
            <button class="btn" id="clear" onclick="clearDisplay()">AC</button>
            <button class="btn operator" onclick="appendValue('/')">/</button>
            <button class="btn" onclick="appendValue(7)">7</button>
            <button class="btn" onclick="appendValue(8)">8</button>
            <button class="btn" onclick="appendValue(9)">9</button>
            <button class="btn operator" onclick="appendValue('*')"><i class="fa-solid fa-xmark"></i></button>
            <button class="btn" onclick="appendValue(4)">4</button>
            <button class="btn" onclick="appendValue(5)">5</button>
            <button class="btn" onclick="appendValue(6)">6</button>
            <button class="btn operator" onclick="appendValue('-')"><i class="fa-solid fa-minus"></i></button>
            <button class="btn" onclick="appendValue(1)">1</button>
            <button class="btn" onclick="appendValue(2)">2</button>
            <button class="btn" onclick="appendValue(3)">3</button>
            <button class="btn operator" onclick="appendValue('+')"><i class="fa-solid fa-plus"></i></button>
            <button class="btn zero" onclick="appendValue(0)">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
            <button class="btn" id="equalOperator" onclick="equal()"><i class="fa-solid fa-equals"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
